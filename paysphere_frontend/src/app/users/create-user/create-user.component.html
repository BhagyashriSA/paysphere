<div class="create-user-container">
  <div class="card">
    <h2>Create User</h2>

    <div class="form-body">
      <!-- Left: Image Upload -->
      <div class="image-section">
        <div class="avatar">
          <img *ngIf="imagePreview; else placeholder" [src]="imagePreview" />
          <ng-template #placeholder>
            <span>📷</span>
          </ng-template>
        </div>

        <label class="upload-btn">
          Upload Photo
          <input type="file" hidden (change)="onImageUpload($event)" />
        </label>
      </div>

      <!-- Right: Form -->
      <form [formGroup]="userForm" class="form-grid">

        <div class="form-group">
          <label>Username</label>
          <input type="text" formControlName="username" />
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="fullName" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" />
        </div>

        <div class="form-group password">
          <label>Password</label>
          <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
          <span (click)="hidePassword = !hidePassword">👁</span>
        </div>

        <div class="form-group">
          <label>Role</label>
          <select formControlName="role">
            <option value="">Select role</option>
            <option>ADMIN</option>
            <option>USER</option>
            <option>HR</option>
          </select>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select formControlName="status">
            <option value="">Select status</option>
            <option>ACTIVE</option>
            <option>INACTIVE</option>
          </select>
        </div>

      </form>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="cancel" (click)="cancel()">Cancel</button>
      <button class="create" (click)="submit()">Create User</button>
    </div>
  </div>
</div>
